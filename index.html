<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero Operativo — Mar Azul Suites</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══ VARIABLES ═══ */
:root {
  --navy:#0D2B5E; --ocean:#185FA5; --sky:#4A9FD4;
  --teal:#1a9a7a; --teal-lt:#e0f5ef;
  --sand:#f6f2eb; --sand2:#ece6d8; --sand3:#d4ccbc;
  --white:#fefcf9; --ink:#1c1917; --muted:#7a6f60; --muted2:#a8998a;
  --green:#1e8a4e; --green-lt:#e6f5ee;
  --amber:#c27d0a; --amber-lt:#fef3e0;
  --red:#c0392b; --red-lt:#fdeaea;
  --radius:10px; --radius-lg:14px;
  --shadow:0 2px 16px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Sora',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--sand2)}
::-webkit-scrollbar-thumb{background:var(--sand3);border-radius:2px}

/* ═══ TOPBAR ═══ */
.topbar{background:var(--navy);padding:0 24px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:300}
.tb-brand{font-size:14px;font-weight:600;color:white;display:flex;align-items:center;gap:8px;margin-right:auto}
.tb-brand span{color:#5dade2;font-weight:300}
.week-nav{display:flex;align-items:center;gap:6px}
.wbtn{background:rgba(255,255,255,.12);border:none;color:white;width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.wbtn:hover{background:rgba(255,255,255,.22)}
.wlabel{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.8);background:rgba(255,255,255,.1);padding:4px 12px;border-radius:7px;white-space:nowrap}
.tb-user{display:flex;align-items:center;gap:7px}
.avatar-sm{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:white;flex-shrink:0}
.btn-logout{font-size:11px;color:rgba(255,255,255,.6);background:none;border:0.5px solid rgba(255,255,255,.2);padding:4px 10px;border-radius:6px;cursor:pointer}
.btn-logout:hover{color:white;border-color:rgba(255,255,255,.4)}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-dot.ok{background:#4ade80}
.sync-dot.loading{background:#facc15;animation:pulse .8s ease-in-out infinite}
.sync-dot.err{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ═══ LAYOUT ═══ */
.layout{display:flex;min-height:calc(100vh - 52px)}

/* ═══ SIDEBAR ═══ */
.sidebar{width:210px;flex-shrink:0;background:var(--white);border-right:1px solid var(--sand3);padding:16px 0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sb-title{font-size:10px;font-weight:600;color:var(--muted2);letter-spacing:1.2px;text-transform:uppercase;padding:0 16px 7px}
.area-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 16px;background:none;border:none;cursor:pointer;font-family:'Sora',sans-serif;font-size:12px;font-weight:500;color:var(--muted);text-align:left;transition:all .15s;border-left:3px solid transparent}
.area-btn:hover{background:var(--sand);color:var(--ink)}
.area-btn.on{background:var(--sand);color:var(--ink);border-left-color:var(--ac)}
.area-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--ac)}
.area-cnt{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--sand2);color:var(--muted);padding:1px 5px;border-radius:8px;min-width:18px;text-align:center}
.sb-sep{height:1px;background:var(--sand2);margin:10px 16px}
.person-btn{display:flex;align-items:center;gap:7px;padding:7px 16px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;border-left:3px solid transparent;user-select:none}
.person-btn:hover{background:var(--sand);color:var(--ink)}
.person-btn.on{background:var(--sand);color:var(--ink);border-left-color:var(--ink)}
.sb-prog-wrap{padding:8px 16px}
.prog-bar-bg{height:4px;background:var(--sand2);border-radius:2px;overflow:hidden;margin-top:6px}
.prog-bar{height:100%;border-radius:2px;transition:width .4s;background:var(--teal)}

/* ═══ MAIN ═══ */
.main{flex:1;padding:20px;overflow-x:hidden}

/* ═══ AREA HEADER ═══ */
.area-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.area-icon-box{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.area-hdr-name{font-size:19px;font-weight:700;color:var(--ink)}
.area-hdr-sub{font-size:11px;color:var(--muted);margin-top:1px}

/* ═══ STATS ═══ */
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px}
.stat{background:var(--white);border:0.5px solid var(--sand2);border-radius:var(--radius);padding:10px 12px}
.stat-l{font-size:10px;color:var(--muted2);margin-bottom:3px}
.stat-v{font-size:20px;font-weight:700;color:var(--ink)}
.stat-s{font-size:10px;color:var(--muted);margin-top:2px}

/* ═══ FILTERS ═══ */
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.fbtn{font-size:11px;padding:4px 10px;border-radius:14px;border:0.5px solid var(--sand3);background:var(--white);color:var(--muted);cursor:pointer;transition:all .15s}
.fbtn:hover{border-color:var(--muted);color:var(--ink)}
.fbtn.on{background:var(--ink);color:var(--white);border-color:var(--ink)}
.add-btn{margin-left:auto;font-family:'Sora',sans-serif;font-size:12px;font-weight:500;padding:6px 16px;border-radius:20px;border:none;background:var(--navy);color:white;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .15s}
.add-btn:hover{background:var(--ocean)}

/* ═══ TASK CARDS ═══ */
.tasks{display:flex;flex-direction:column;gap:7px}
.tcard{background:var(--white);border:0.5px solid var(--sand2);border-radius:var(--radius-lg);padding:12px 14px;display:grid;grid-template-columns:22px 1fr auto;gap:0 10px;align-items:start;border-left:3px solid transparent;transition:all .15s}
.tcard:hover{border-color:var(--sand3)}
.tcard.done{opacity:.55}
.tcard.done .ttitle{text-decoration:line-through;color:var(--muted)}
.chk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--sand3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s;background:var(--white);font-size:12px;font-weight:700;color:white;user-select:none}
.chk:hover{border-color:var(--teal)}
.chk.on{background:var(--teal);border-color:var(--teal)}
.chk.locked{cursor:default;opacity:.4}
.chk.locked:hover{border-color:var(--sand3)}
.tmain{min-width:0}
.ttitle{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:5px;line-height:1.4}
.tmeta{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:9px;font-size:10px;font-weight:500;white-space:nowrap}
.b-p{background:var(--sand2);color:var(--muted)}
.b-high{background:#FCEBEB;color:#A32D2D}
.b-med{background:#FAEEDA;color:#854F0B}
.b-low{background:#EAF3DE;color:#3B6D11}
.b-date{background:#E6F1FB;color:#0C447C}
.b-date.ov{background:#FCEBEB;color:#A32D2D}
.b-temp{background:var(--sand2);color:var(--muted2)}
.tnote{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5;background:var(--sand);border-radius:6px;padding:5px 8px}
.tactions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.tcard:hover .tactions{opacity:1}
.ibtn{width:26px;height:26px;border-radius:6px;border:none;background:var(--sand);color:var(--muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ibtn:hover{background:var(--sand2)}
.ibtn.del:hover{background:var(--red-lt);color:var(--red)}
.note-form{display:flex;gap:6px;margin-top:7px}
.note-form input{flex:1;font-size:12px;padding:5px 9px;border-radius:6px;border:0.5px solid var(--sand3);background:var(--white);color:var(--ink);outline:none;font-family:'Sora',sans-serif}
.note-form input:focus{border-color:var(--ocean)}
.note-form button{font-size:11px;padding:5px 10px;border-radius:6px;border:none;background:var(--navy);color:white;cursor:pointer;font-family:'Sora',sans-serif;white-space:nowrap}

/* ═══ SEGUIMIENTO ═══ */
.seg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:20px}
.seg-card{background:var(--white);border:0.5px solid var(--sand2);border-radius:var(--radius-lg);overflow:hidden}
.seg-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--sand2)}
.seg-prog{height:3px;background:var(--sand2)}
.seg-prog-fill{height:100%;transition:width .4s}
.seg-row{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:0.5px solid var(--sand);font-size:12px}
.seg-row:last-child{border-bottom:none}
.seg-chk{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--sand3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white}
.seg-chk.on{background:var(--teal);border-color:var(--teal)}

/* ═══ LOGIN ═══ */
.login{display:flex;flex-direction:column;align-items:center;gap:20px;padding:40px 20px}
.login h1{font-size:22px;font-weight:500;color:var(--ink)}
.login p{font-size:13px;color:var(--muted)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:460px}
.pcard{background:var(--white);border:0.5px solid var(--sand2);border-radius:var(--radius-lg);padding:16px 12px;cursor:pointer;text-align:center;transition:all .15s}
.pcard:hover{border-color:var(--sand3);transform:translateY(-2px)}
.pavatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:white;margin:0 auto 8px}
.pname{font-size:13px;font-weight:500;color:var(--ink)}
.prole{font-size:10px;color:var(--muted);margin-top:2px}

/* ═══ MODAL ═══ */
.mo-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;padding:20px}
.mo{background:var(--white);border-radius:16px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden}
.mo-head{padding:16px 18px;border-bottom:0.5px solid var(--sand2);display:flex;align-items:center;justify-content:space-between}
.mo-head h2{font-size:15px;font-weight:600;color:var(--ink);margin:0}
.mo-x{width:28px;height:28px;border-radius:6px;border:none;background:var(--sand);color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.mo-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px;max-height:70vh;overflow-y:auto}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.fi{font-family:'Sora',sans-serif;font-size:13px;padding:8px 10px;border-radius:7px;border:0.5px solid var(--sand3);background:var(--white);color:var(--ink);width:100%;outline:none;transition:border .15s}
.fi:focus{border-color:var(--ocean)}
textarea.fi{resize:vertical;min-height:60px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mo-foot{padding:12px 18px;border-top:0.5px solid var(--sand2);display:flex;gap:8px;justify-content:flex-end}
.btn-c{font-family:'Sora',sans-serif;font-size:12px;padding:7px 14px;border-radius:7px;border:0.5px solid var(--sand3);background:var(--white);color:var(--muted);cursor:pointer}
.btn-s{font-family:'Sora',sans-serif;font-size:12px;font-weight:500;padding:7px 18px;border-radius:7px;border:none;background:var(--navy);color:white;cursor:pointer}
.btn-s:hover{background:var(--ocean)}
.btn-s:disabled{opacity:.5;cursor:not-allowed}

/* ═══ EMPTY / LOADING ═══ */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.loading-msg{text-align:center;padding:30px;font-size:13px;color:var(--muted)}
.view-toggle{display:flex;gap:6px;margin-bottom:14px;align-items:center}
.vtbtn{font-size:12px;padding:5px 12px;border-radius:14px;border:0.5px solid var(--sand3);background:var(--white);color:var(--muted);cursor:pointer;transition:all .15s}
.vtbtn.on{background:var(--ink);color:var(--white);border-color:var(--ink)}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:white;font-size:12px;padding:9px 16px;border-radius:9px;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:12px}
  .frow{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr 1fr}
  .pgrid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- ══ TOPBAR ══ -->
<div class="topbar" id="topbar" style="display:none">
  <div class="tb-brand">🌊 Mar Azul Suites <span>· Tablero Operativo</span></div>
  <div class="week-nav">
    <button class="wbtn" onclick="chWeek(-1)">‹</button>
    <div class="wlabel" id="wlabel">—</div>
    <button class="wbtn" onclick="chWeek(1)">›</button>
  </div>
  <div class="tb-user">
    <div class="sync-dot" id="syncDot" title="Estado de sincronización"></div>
    <div class="avatar-sm" id="topAvatar"></div>
    <span style="font-size:12px;color:rgba(255,255,255,.7)" id="topName"></span>
    <button class="btn-logout" onclick="logout()">Cambiar</button>
  </div>
</div>

<!-- ══ MAIN LAYOUT ══ -->
<div class="layout" id="mainLayout" style="display:none">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="mainArea"></div>
</div>

<!-- ══ LOGIN ══ -->
<div id="loginScreen">
  <div class="login">
    <div style="font-size:24px">🌊</div>
    <h1>Mar Azul Suites</h1>
    <p>Tablero Operativo — Seleccioná tu perfil</p>
    <div class="pgrid" id="personGrid"></div>
  </div>
</div>

<!-- ══ MODAL ══ -->
<div class="mo-overlay" id="moOverlay" style="display:none" onclick="closeMoOutside(event)">
  <div class="mo" id="moBox"></div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<script>
// ══ CONFIG ══════════════════════════════════════════════════════
// REEMPLAZÁ esta URL con la que te da Google Apps Script al desplegar
const API_URL = 'https://script.google.com/macros/s/AKfycbzMLPNm0YTWE_oCj51VCBWrfNhpcUysBAoFd8cwJOn-q8EskkDFE3cu8-o7RQ93pYus/exec';

// ══ DATOS ═══════════════════════════════════════════════════════
const AREAS = [
  { id:'ventas',    name:'Ventas',          icon:'💼', color:'#185FA5' },
  { id:'compras',   name:'Compras',         icon:'🛒', color:'#1e8a4e' },
  { id:'mant',      name:'Mantenimiento',   icon:'🔧', color:'#c27d0a' },
  { id:'house',     name:'Housekeeping',    icon:'🛏', color:'#6c3483' },
  { id:'tesoreria', name:'Tesorería',       icon:'💰', color:'#c0392b' },
  { id:'marketing', name:'Marketing',       icon:'📣', color:'#0D7B8A' },
  { id:'rrhh',      name:'RRHH',            icon:'👥', color:'#8B4513' },
];
const PERSONS = [
  { id:'agustin', name:'Agustín', color:'#185FA5', role:'admin' },
  { id:'miriam',  name:'Miriam',  color:'#1e8a4e', role:'admin' },
  { id:'martin',  name:'Martín',  color:'#c27d0a', role:'colab' },
  { id:'celeste', name:'Celeste', color:'#6c3483', role:'colab' },
  { id:'crispin', name:'Crispín', color:'#c0392b', role:'colab' },
  { id:'selva',   name:'Selva',   color:'#0D7B8A', role:'colab' },
];
const PRIO  = { high:'Alta', med:'Media', low:'Baja' };
const TEMP  = { weekly:'Esta semana', biweekly:'Quincenal', monthly:'Mensual', recurring:'Recurrente', oneoff:'Única vez' };

// ══ ESTADO ══════════════════════════════════════════════════════
let me = null;
let weekOff = 0;
let curArea = 'ventas';
let curView = 'home'; // home | area | seg
let fStatus = 'all';
let fPrio   = 'all';
let curPersonFilter = null;
let tasks = [];
let editId = null;
let noteForId = null;
let syncing = false;
let pollInterval = null;

// ══ SEMANA ══════════════════════════════════════════════════════
function weekStart(off = weekOff) {
  const n = new Date(); const dy = n.getDay();
  const d = new Date(n);
  d.setDate(n.getDate() + (dy===0?-6:1-dy) + off*7);
  d.setHours(0,0,0,0); return d;
}
function weekEnd(off = weekOff) {
  const s = weekStart(off); const e = new Date(s);
  e.setDate(s.getDate()+6); return e;
}
function weekKey(off = weekOff) {
  return 'week_' + weekStart(off).toISOString().slice(0,10);
}
function fmtDate(d) { return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtShort(d) { return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}); }
function updateWeekLabel() {
  document.getElementById('wlabel').textContent = `${fmtDate(weekStart())} — ${fmtDate(weekEnd())}`;
}

// ══ SYNC ════════════════════════════════════════════════════════
function setSyncState(state) {
  const dot = document.getElementById('syncDot');
  if (!dot) return;
  dot.className = 'sync-dot ' + state;
  dot.title = state==='ok'?'Sincronizado':state==='loading'?'Sincronizando...':'Error de conexión';
}

async function fetchTasks() {
  if (!API_URL || API_URL === 'TU_URL_DE_APPS_SCRIPT_AQUI') {
    setSyncState('ok');
    return JSON.parse(localStorage.getItem(weekKey()) || '[]');
  }
  setSyncState('loading');
  try {
    const res = await fetch(`${API_URL}?action=getTasks&weekKey=${encodeURIComponent(weekKey())}`);
    const data = await res.json();
    setSyncState('ok');
    const remote = data.tasks || [];
    return remote;
  } catch(e) {
    setSyncState('err');
    const local = JSON.parse(localStorage.getItem(weekKey()) || '[]');
    return local;
  }
}

async function apiPost(body) {
  if (!API_URL || API_URL === 'TU_URL_DE_APPS_SCRIPT_AQUI') {
    // Demo mode — guardar solo en localStorage
    if (body.action === 'saveTask') {
      let tasks = JSON.parse(localStorage.getItem(weekKey()) || '[]');
      const idx = tasks.findIndex(t => t.id === body.task.id);
      if (idx >= 0) tasks[idx] = body.task; else tasks.push(body.task);
      localStorage.setItem(weekKey(), JSON.stringify(tasks));
    }
    if (body.action === 'toggleTask') {
      let tasks = JSON.parse(localStorage.getItem(weekKey()) || '[]');
      const t = tasks.find(t => t.id === body.id);
      if (t) { t.done = body.done; t.doneBy = body.doneBy; t.doneAt = body.doneAt; }
      localStorage.setItem(weekKey(), JSON.stringify(tasks));
    }
    if (body.action === 'deleteTask') {
      let tasks = JSON.parse(localStorage.getItem(weekKey()) || '[]').filter(t => t.id !== body.id);
      localStorage.setItem(weekKey(), JSON.stringify(tasks));
    }
    if (body.action === 'addNote') {
      let tasks = JSON.parse(localStorage.getItem(weekKey()) || '[]');
      const t = tasks.find(t => t.id === body.id);
      if (t) { const prev = t.notes ? t.notes + ' | ' : ''; t.notes = prev + `[${body.personName}]: ${body.note}`; }
      localStorage.setItem(weekKey(), JSON.stringify(tasks));
    }
    return { ok: true };
  }
  setSyncState('loading');
  try {
    // Usar GET con datos serializados para evitar CORS
    const params = new URLSearchParams({
      action: body.action,
      data: JSON.stringify(body)
    });
    const res = await fetch(`${API_URL}?${params.toString()}`);
    const data = await res.json();
    setSyncState('ok');
    return data;
  } catch(e) {
    setSyncState('err');
    toast('Error al guardar');
    return { error: e.toString() };
  }
}

function saveLocalCache(t) {
  localStorage.setItem(weekKey(), JSON.stringify(t));
}

async function loadAndRender() {
  tasks = await fetchTasks();
  saveLocalCache(tasks);
  renderAll();
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  // Solo hacer polling si la API está configurada
  if (!API_URL || API_URL === 'TU_URL_DE_APPS_SCRIPT_AQUI') return;
  pollInterval = setInterval(async () => {
    const fresh = await fetchTasks();
    // Solo actualizar si hay datos remotos reales
    if (fresh.length > 0 || tasks.length === 0) {
      const changed = JSON.stringify(fresh) !== JSON.stringify(tasks);
      if (changed) { tasks = fresh; saveLocalCache(tasks); renderAll(); }
    }
  }, 8000);
}

// ══ TOAST ════════════════════════════════════════════════════════
function toast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ══ LOGIN ════════════════════════════════════════════════════════
function renderLogin() {
  document.getElementById('loginScreen').style.display = '';
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('mainLayout').style.display = 'none';
  document.getElementById('personGrid').innerHTML = PERSONS.map(p => `
    <div class="pcard" onclick="login('${p.id}')">
      <div class="pavatar" style="background:${p.color}">${p.name[0]}</div>
      <div class="pname">${p.name}</div>
      <div class="prole">${p.role==='admin'?'Administrador':'Colaborador'}</div>
    </div>`).join('');
}

function login(id) {
  me = PERSONS.find(p=>p.id===id);
  localStorage.setItem('mas_user', id);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('mainLayout').style.display = 'flex';
  const av = document.getElementById('topAvatar');
  av.style.background = me.color; av.textContent = me.name[0];
  document.getElementById('topName').textContent = me.name;
  updateWeekLabel();
  loadAndRender();
  startPolling();
}

function logout() {
  me = null;
  clearInterval(pollInterval);
  localStorage.removeItem('mas_user');
  renderLogin();
}

function isAdmin() { return me?.role === 'admin'; }
function canCheck(t) { return isAdmin() || t.person === me?.id; }

function renderTask(t) {
  const area   = AREAS.find(a=>a.id===t.area);
  const person = PERSONS.find(p=>p.id===t.person);
  const today  = new Date(); today.setHours(0,0,0,0);
  const ov     = !t.done && t.dueDate && new Date(t.dueDate) < today;
  const pbc    = {high:'b-high',med:'b-med',low:'b-low'};
  const pbe    = {high:'🔴',med:'🟡',low:'🟢'};
  const canC   = canCheck(t);
  const isMe   = t.person === me?.id;
  const showNF = noteForId === t.id;

  return `<div class="tcard ${t.done?'done':''}" style="border-left-color:${area?.color||'transparent'}">
    <div class="chk ${t.done?'on':''} ${!canC?'locked':''}"
      onclick="${canC?`doToggle('${t.id}')`:''}">${t.done?'✓':''}</div>
    <div class="tmain">
      <div class="ttitle">${esc(t.title)}</div>
      <div class="tmeta">
        ${person?`<span class="badge b-p" style="background:${person.color}15;color:${person.color}">
          <span style="width:6px;height:6px;border-radius:50%;background:${person.color};display:inline-block"></span>
          ${person.name}</span>`:''}
        ${curPersonFilter&&area?`<span class="badge" style="background:${area.color};color:white">${area.icon} ${area.name}</span>`:''}
        <span class="badge ${pbc[t.priority]||''}">${pbe[t.priority]||''} ${PRIO[t.priority]||''}</span>
        ${t.temp?`<span class="badge b-temp">⏱ ${TEMP[t.temp]||t.temp}</span>`:''}
        ${t.dueDate?`<span class="badge b-date ${ov?'ov':''}">📅 ${fmtShort(new Date(t.dueDate))}${ov?' · Vencida':''}</span>`:''}
      </div>
      ${t.notes?`<div class="tnote">📝 ${esc(t.notes)}</div>`:''}
      ${(isMe||isAdmin())&&!showNF?`<button onclick="showNoteForm('${t.id}')"
        style="font-size:11px;margin-top:6px;color:var(--muted);background:none;border:0.5px solid var(--sand3);padding:3px 8px;border-radius:5px;cursor:pointer">+ Agregar nota</button>`:''}
      ${showNF?`<div class="note-form">
        <input id="ni_${t.id}" placeholder="Escribí tu nota..." onkeydown="if(event.key==='Enter')doNote('${t.id}')">
        <button onclick="doNote('${t.id}')">Guardar</button>
        <button onclick="cancelNote()" style="background:var(--sand2);color:var(--muted);font-size:11px;padding:5px 8px;border-radius:6px;border:none;cursor:pointer">✕</button>
      </div>`:''}
    </div>
    <div class="tactions">
      ${isAdmin()?`<button class="ibtn" onclick="openModal('${t.id}')">✏️</button>`:''}
      ${isAdmin()?`<button class="ibtn del" onclick="doDelete('${t.id}')">🗑</button>`:''}
    </div>
  </div>`;
}

// ══ ACTIONS ══════════════════════════════════════════════════════
function sortT(a,b){
  if(a.done!==b.done)return a.done?1:-1;
  const o={high:0,med:1,low:2};
  if(o[a.priority]!==o[b.priority])return o[a.priority]-o[b.priority];
  if(a.dueDate&&b.dueDate)return new Date(a.dueDate)-new Date(b.dueDate);
  return 0;
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function chWeek(d){
  weekOff+=d; updateWeekLabel();
  tasks=JSON.parse(localStorage.getItem(weekKey())||'[]');
  renderAll(); loadAndRender();
}
function selectArea(id){ curArea=id; curPersonFilter=null; curView='area'; renderAll(); }
function filterPerson(id){ curPersonFilter=(curPersonFilter===id?null:id); curView='area'; renderAll(); }
function clearPersonFilter(){ curPersonFilter=null; renderAll(); }
function setView(v){
  curView=v;
  if(v==='area'||v==='home') curPersonFilter=null;
  renderAll();
}
function setF(type,val){ if(type==='s')fStatus=val; else fPrio=val; renderAll(); }

async function doToggle(id){
  const t=tasks.find(t=>t.id===id); if(!t||!canCheck(t))return;
  t.done=!t.done; t.doneBy=t.done?me.id:null; t.doneAt=t.done?new Date().toISOString():null;
  saveLocalCache(tasks); renderAll();
  await apiPost({action:'toggleTask',id,done:t.done,doneBy:t.doneBy||'',doneAt:t.doneAt||''});
  await loadAndRender();
  toast(t.done?'✓ Tarea completada':'↩ Tarea reabierta');
}

async function doDelete(id){
  if(!confirm('¿Eliminar esta tarea?'))return;
  tasks=tasks.filter(t=>t.id!==id);
  saveLocalCache(tasks); renderAll();
  await apiPost({action:'deleteTask',id});
  await loadAndRender();
  toast('Tarea eliminada');
}

function showNoteForm(id){ noteForId=id; renderAll(); setTimeout(()=>document.getElementById('ni_'+id)?.focus(),50); }
function cancelNote(){ noteForId=null; renderAll(); }

async function doNote(id){
  const inp=document.getElementById('ni_'+id);
  const note=inp?.value.trim(); if(!note)return;
  const t=tasks.find(t=>t.id===id); if(!t)return;
  const prev=t.notes?t.notes+' | ':'';
  t.notes=prev+`[${me.name}]: ${note}`;
  noteForId=null; saveLocalCache(tasks); renderAll();
  await apiPost({action:'addNote',id,note,personName:me.name});
  await loadAndRender();
  toast('Nota guardada');
}

        <input class="fi" id="mT" value="${t?esc(t.title):''}" placeholder="Describí la tarea..."></div>
      <div class="frow">
        <div class="fg"><label class="fl">Área *</label>
          <select class="fi" id="mA">
            ${AREAS.map(a=>`<option value="${a.id}" ${(t?.area||curArea)===a.id?'selected':''}>${a.icon} ${a.name}</option>`).join('')}
          </select></div>
        <div class="fg"><label class="fl">Responsable *</label>
          <select class="fi" id="mP">
            ${PERSONS.map(p=>`<option value="${p.id}" ${t?.person===p.id?'selected':''}>${p.name}</option>`).join('')}
          </select></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Prioridad</label>
          <select class="fi" id="mPr">
            <option value="high" ${t?.priority==='high'?'selected':''}>🔴 Alta</option>
            <option value="med"  ${(!t||t?.priority==='med')?'selected':''}>🟡 Media</option>
            <option value="low"  ${t?.priority==='low'?'selected':''}>🟢 Baja</option>
          </select></div>
        <div class="fg"><label class="fl">Temporalidad</label>
          <select class="fi" id="mTe">
            <option value="weekly"    ${(!t||t?.temp==='weekly')?'selected':''}>Esta semana</option>
            <option value="biweekly"  ${t?.temp==='biweekly'?'selected':''}>Quincenal</option>
            <option value="monthly"   ${t?.temp==='monthly'?'selected':''}>Mensual</option>
            <option value="recurring" ${t?.temp==='recurring'?'selected':''}>Recurrente</option>
            <option value="oneoff"    ${t?.temp==='oneoff'?'selected':''}>Única vez</option>
          </select></div>
      </div>
      <div class="fg"><label class="fl">Fecha límite</label>
        <input type="date" class="fi" id="mD" value="${t?.dueDate||''}"></div>
      <div class="fg"><label class="fl">Notas</label>
        <textarea class="fi" id="mN" placeholder="Contexto, links, detalles...">${t?.notes||''}</textarea></div>
    </div>
    <div class="mo-foot">
      <button class="btn-c" onclick="closeMo()">Cancelar</button>
      <button class="btn-s" id="btnSave" onclick="saveTask()">Guardar tarea</button>
    </div>`;
  document.getElementById('moOverlay').style.display='flex';
  setTimeout(()=>document.getElementById('mT')?.focus(),100);
}
function closeMo(){ document.getElementById('moOverlay').style.display='none'; editId=null; }
function closeMoOutside(e){ if(e.target===document.getElementById('moOverlay'))closeMo(); }

async function saveTask(){
  const title=document.getElementById('mT')?.value.trim();
  if(!title){document.getElementById('mT')?.focus();return;}
  const btn=document.getElementById('btnSave');
  btn.disabled=true; btn.textContent='Guardando...';
  const task={
    id: editId||(Date.now().toString(36)+Math.random().toString(36).slice(2)),
    title,
    area: document.getElementById('mA')?.value,
    person: document.getElementById('mP')?.value,
    priority: document.getElementById('mPr')?.value,
    temp: document.getElementById('mTe')?.value,
    dueDate: document.getElementById('mD')?.value||null,
    notes: document.getElementById('mN')?.value.trim()||null,
    done: false,
    doneBy: null, doneAt: null,
    weekKey: weekKey(),
    createdBy: me.id,
    createdAt: new Date().toISOString(),
  };
  if(editId){
    const idx=tasks.findIndex(t=>t.id===editId);
    if(idx>=0){task.done=tasks[idx].done;task.doneBy=tasks[idx].doneBy;task.doneAt=tasks[idx].doneAt;tasks[idx]=task;}
  } else {
    tasks.push(task);
  }
  curArea=task.area; curView='area';
  saveLocalCache(tasks); closeMo(); renderAll();
  const result = await apiPost({action:'saveTask',task});
  if(result && result.ok) {
    await loadAndRender();
    toast(editId?'Tarea actualizada':'Tarea creada');
  } else {
    toast('Error al sincronizar — verificá la conexión');
  }
}

// ══ INIT ═════════════════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeMo();
  if(e.key==='n'&&!document.getElementById('moOverlay').style.display.includes('flex')
    &&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'
    &&isAdmin()) openModal();
});

// Auto-login si guardó sesión
const savedUser = localStorage.getItem('mas_user');
if(savedUser && PERSONS.find(p=>p.id===savedUser)){
  login(savedUser);
} else {
  renderLogin();
}
</script>
